name: Build

on:
  push:
    tags:
      - v*

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
      
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install dependencies
        run: uv sync --python 3.13
      
      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          uv run python -m nuitka --windows-console-mode=disable --output-filename=image-renamer-windows.exe renamer.py

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get install -y python3-tk
          uv run python -m nuitka --enable-plugin=tk-inter --output-filename=image-renamer-linux renamer.py

      - name: Upload to Release (Windows)
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            image-renamer-windows.exe

      - name: Upload to Release (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            image-renamer-linux